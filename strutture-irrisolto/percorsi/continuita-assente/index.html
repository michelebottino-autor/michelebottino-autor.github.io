<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';

    font-src 'self';

  <meta property="og:type" content="website">
  <meta property="og:locale" content="it_IT">

  <meta property="og:title" content="Continuità assente | Percorsi strutturali | Michele Bottino">

  <meta property="og:url" content="https://michelebottino-autor.github.io/strutture-irrisolto/percorsi/continuita-assente/">

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg-main: #1f2623;
      --bg-panel: #2a312d;
      --bg-panel-2: #313a35;
      --bg-panel-3: #242b27;
      --text-main: #e5d3a3;
      --text-soft: #cdb989;
      --text-muted: #a9915f;
      --line: #8f7748;
      --accent: #c2a46d;
      --accent-strong: #e1c07e;
      --shadow: 0 18px 42px rgba(0,0,0,.28);
      --shadow-soft: 0 10px 24px rgba(0,0,0,.18);
      --radius: 14px;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(194,164,109,.05), transparent 34%),
        linear-gradient(180deg, #202825 0%, #1f2623 100%);
    }

    .container {
      max-width: 1140px;
      margin: 0 auto;
      padding: 22px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .nav-menu {
      display: flex;
      gap: 14px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .has-submenu { position: relative; }

    .submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--bg-panel);
      border: 1px solid var(--line);
      padding: 8px;
      z-index: 50;
    }

    .has-submenu.open .submenu { display: block; }

    .submenu li a {
      display: block;
      padding: 8px 12px;
    }

    .breadcrumb {
      padding: 12px 22px;
      color: var(--text-soft);
    }

    .page-header {
      background: var(--bg-panel);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
    }

    .card {
      background: var(--bg-panel-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    footer {
      padding: 30px;
      color: var(--text-muted);
    }

    .visit-counter {
      margin-top: 10px;
      color: var(--accent);
    }
  </style>
</head>

<body>

<header class="container">
  <nav class="nav" id="site-nav">
    <a href="../../../"><img src="../../../images/logo.png" height="60"></a>

    <button id="menu-toggle" onclick="toggleMenu()">☰</button>

    <ul class="nav-menu" id="menu">
      <li><a href="../../../">Home</a></li>

      <li class="has-submenu">
        <button class="submenu-toggle">Autore</button>
        <ul class="submenu">
          <li><a href="../../../biografia/">Biografia</a></li>
          <li><a href="../../../poetica/">Poetica</a></li>
        </ul>
      </li>

      <li class="has-submenu">
        <button class="submenu-toggle active">Metodo</button>
        <ul class="submenu">
          <li><a href="../../../metodo/">Metodo</a></li>
          <li><a href="../../" class="active">Strutture</a></li>
        </ul>
      </li>
    </ul>
  </nav>
</header>

<div class="breadcrumb">
  Home / Strutture / Continuità assente
</div>

<main class="container">

  <div class="page-header">
    <h1>Continuità assente</h1>
    <p>Percorso strutturale: perdita di continuità nel punto decisivo.</p>
  </div>

  <section>
    <h2>Strutture pubblicate</h2>

    <div class="cards-grid">
      <div class="card">
        <img src="../../../images/articoli/MB_COVER_ANGELA_CELENTANO_V2.png">
        <div style="padding:16px">
          <h3>Angela Celentano</h3>
          <a href="../../angela-celentano/">Apri struttura</a>
        </div>
      </div>
    </div>
  </section>

</main>

<footer class="container">
  <p>© 2026 Michele Bottino</p>
  <div class="visit-counter">
    Visite: <span id="visit-count">...</span>
  </div>
</footer>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

document.querySelectorAll(".submenu-toggle").forEach(btn => {
  btn.onclick = () => {
    const parent = btn.parentElement;
    parent.classList.toggle("open");
  };
});

async function updateVisitCounter() {
  const key = location.pathname.replace(/\//g,'-') || 'home';
  const res = await fetch(`https://api.counterapi.dev/v1/site/${key}/up`);
  const data = await res.json();
  document.getElementById("visit-count").textContent = data.count;
}

updateVisitCounter();
</script>

</body>
</html>
